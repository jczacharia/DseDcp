# CyberArk → OpenShift Secret manifest for dse-deploy.
#
# Each `openshift-secret` component declares a K8s Secret whose entries are populated by the Enterprise CD
# pipeline at deploy time, sourced from CyberArk safe entries. The pod consumes via `envFrom: secretRef` in the
# searchapi values file (`environments/SearchApi/<env>.yaml`).
#
# Onboarding (per env, one-time):
#   1. ServiceNow CyberArk Onboarding request — add this app's AppId to DSE-STATIC-<ENV> and DSE-DYNAMIC-<ENV>
#      safes using the literal `DDP-CERT-<ENV>` Account IDs.
#   2. Board the `XQDSE<env>LDAP` credential via the AAM Self-Service Portal at the env's AAM URL.
#   3. Note the `address` and `username` fields you choose when boarding — they appear below as
#      `cyberark_address` / `cyberark_username`.
#
# Updates: change the password in CyberArk, then re-run the secrets-deploy Jenkins job for the env. CR required
# for PROD only.
#
# .NET options binding: `LdapAuth__BindPassword` env var binds to `LdapAuth:BindPassword` because the options
# binder treats `__` as the section separator. PascalCase keys match the C# property names exactly, which is
# the convention this app uses for env-var-sourced config.

manifest:
  group: pnc.dse.ocp4.deployments
  artifactId: dse-deploy-secrets-manifest
  version: 1.0.0
  environments:
    rnd:
      level: rnd
  components:
    - name: dse.searchapi-secrets.openshift-secret
      type: openshift-secret
      vars:
        source: cyberark
        openshift_secret_name: searchapi-secrets # matches `envFrom.secretRef` on the searchapi pod
      environments:
        rnd:
          vars:
            oc_project: dse-rnd
            openshift_secret_entries:
              - entry_key: LdapAuth__BindPassword
                entry_value:
                  cyberark_safe: DSE-DYNAMIC-RND
                  cyberark_username: XQDSERNDLDAP # AAM entry "username" field — adjust to match the boarded entry
                  # AAM entry "address" field. THIS DIFFERS FROM MOST PNC SERVICE ACCOUNTS: most app
                  # service-account entries are boarded with address `mdsemp-<env>.pncint.net` because they
                  # bind to OUD (the enterprise LDAP, o=pnc tree) where app-role entitlements live. DSE binds
                  # to AD (DC=pncbank,DC=com) — Confluence's GSGu_CFL_CFLUsers gate is an AD security group,
                  # not an OUD app-role — so address is `pncbank.com`. See pnc-directory-topology memory.
                  cyberark_address: pncbank.com
